<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>Fluxo · Gestão de Tarefas e Processos</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;550;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,450;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="theme.css?v=4"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="layout.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="empresas.jsx"></script>
<script type="text/babel" src="views.jsx"></script>
<script type="text/babel" src="modals.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "forest",
  "density": "comfortable",
  "font": "inter"
}/*EDITMODE-END*/;

const ACCENTS = {
  forest:  { h: 150, label: 'Floresta' },
  moss:    { h: 135, label: 'Musgo' },
  sage:    { h: 165, label: 'Sálvia' },
  cypress: { h: 180, label: 'Cipreste' },
};

function applyAccent(key) {
  const a = ACCENTS[key] || ACCENTS.forest;
  const r = document.documentElement.style;
  r.setProperty('--fx-green-900', `oklch(28% 0.05 ${a.h})`);
  r.setProperty('--fx-green-800', `oklch(36% 0.07 ${a.h})`);
  r.setProperty('--fx-green-700', `oklch(45% 0.09 ${a.h})`);
  r.setProperty('--fx-green-600', `oklch(54% 0.11 ${a.h})`);
  r.setProperty('--fx-green-500', `oklch(62% 0.12 ${a.h})`);
  r.setProperty('--fx-green-400', `oklch(72% 0.1 ${a.h})`);
  r.setProperty('--fx-green-300', `oklch(82% 0.07 ${a.h})`);
  r.setProperty('--fx-green-200', `oklch(90% 0.05 ${a.h})`);
  r.setProperty('--fx-green-100', `oklch(95% 0.03 ${a.h})`);
  r.setProperty('--fx-green-50',  `oklch(97.5% 0.02 ${a.h})`);
}

function applyFont(font) {
  const r = document.documentElement.style;
  if (font === 'inter') {
    r.setProperty('--fx-serif', "'Inter Tight', sans-serif");
  } else {
    r.setProperty('--fx-serif', "'Fraunces', Georgia, serif");
  }
}

function Ajustes({ cfg, setCfg, theme, toggleTheme }) {
  const update = (k, v) => {
    const next = { ...cfg, [k]: v };
    setCfg(next);
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: {[k]: v}}, '*');
  };
  return (
    <div className="fx-page">
      <div className="fx-page-head">
        <div>
          <h1 className="fx-h1">Ajustes</h1>
          <p className="fx-page-sub">Equipe, permissões e preferências do escritório</p>
        </div>
      </div>

      <div className="fx-settings">
        <aside className="fx-settings-nav">
          <div className="fx-settings-nav-label">Preferências</div>
          <button className="is-active"><Icon name="settings" size={13}/> Aparência</button>
          <button disabled><Icon name="user" size={13}/> Perfil <span className="fx-pill-soon">em breve</span></button>
          <button disabled><Icon name="users" size={13}/> Equipe <span className="fx-pill-soon">em breve</span></button>
          <button disabled><Icon name="eye" size={13}/> Permissões <span className="fx-pill-soon">em breve</span></button>
          <div className="fx-settings-nav-label fx-settings-nav-label--spaced">Escritório</div>
          <button disabled><Icon name="building" size={13}/> Dados do escritório <span className="fx-pill-soon">em breve</span></button>
          <button disabled><Icon name="bell" size={13}/> Notificações <span className="fx-pill-soon">em breve</span></button>
          <button disabled><Icon name="link" size={13}/> Integrações <span className="fx-pill-soon">em breve</span></button>
        </aside>

        <section className="fx-settings-main">
          <header className="fx-settings-section-head">
            <h2 className="fx-h2">Aparência</h2>
            <p className="fx-muted">Personalize como o Fluxo é exibido para você. As alterações são salvas automaticamente neste navegador.</p>
          </header>

          <div className="fx-card fx-settings-card">
            <div className="fx-settings-row">
              <div className="fx-settings-row-meta">
                <div className="fx-settings-row-title">Tema</div>
                <div className="fx-settings-row-sub">Escolha entre claro e escuro.</div>
              </div>
              <div className="fx-theme-picker">
                <button className={'fx-theme-opt '+(theme==='light'?'is-active':'')} onClick={()=>theme!=='light'&&toggleTheme()}>
                  <div className="fx-theme-preview fx-theme-preview--light">
                    <span className="fx-tp-bar"/><span className="fx-tp-body"/>
                  </div>
                  <span className="fx-theme-opt-label"><Icon name="sun" size={13}/> Claro</span>
                </button>
                <button className={'fx-theme-opt '+(theme==='dark'?'is-active':'')} onClick={()=>theme!=='dark'&&toggleTheme()}>
                  <div className="fx-theme-preview fx-theme-preview--dark">
                    <span className="fx-tp-bar"/><span className="fx-tp-body"/>
                  </div>
                  <span className="fx-theme-opt-label"><Icon name="moon" size={13}/> Escuro</span>
                </button>
              </div>
            </div>

            <div className="fx-settings-row">
              <div className="fx-settings-row-meta">
                <div className="fx-settings-row-title">Cor principal</div>
                <div className="fx-settings-row-sub">Define a cor de botões, links e destaques.</div>
              </div>
              <div className="fx-accent-picker">
                {Object.entries(ACCENTS).map(([k, a]) => (
                  <button key={k} className={'fx-accent-opt '+(cfg.accent===k?'is-active':'')} onClick={()=>update('accent', k)}>
                    <span className="fx-accent-chip" style={{background:`oklch(45% 0.09 ${a.h})`}}/>
                    <span>{a.label}</span>
                  </button>
                ))}
              </div>
            </div>

            <div className="fx-settings-row">
              <div className="fx-settings-row-meta">
                <div className="fx-settings-row-title">Tipografia de títulos</div>
                <div className="fx-settings-row-sub">Define o estilo de fonte usado nos cabeçalhos.</div>
              </div>
              <div className="fx-font-picker">
                <button className={'fx-font-opt '+(cfg.font==='fraunces'?'is-active':'')} onClick={()=>update('font','fraunces')}>
                  <span className="fx-font-sample" style={{fontFamily:"'Fraunces', Georgia, serif"}}>Aa</span>
                  <span className="fx-font-opt-meta">
                    <span className="fx-font-opt-name">Serif</span>
                    <span className="fx-font-opt-sub">Fraunces · editorial</span>
                  </span>
                </button>
                <button className={'fx-font-opt '+(cfg.font==='inter'?'is-active':'')} onClick={()=>update('font','inter')}>
                  <span className="fx-font-sample" style={{fontFamily:"'Inter Tight', sans-serif"}}>Aa</span>
                  <span className="fx-font-opt-meta">
                    <span className="fx-font-opt-name">Sans</span>
                    <span className="fx-font-opt-sub">Inter Tight · moderno</span>
                  </span>
                </button>
              </div>
            </div>
          </div>

          <p className="fx-settings-foot fx-muted">As outras preferências estarão disponíveis em breve.</p>
        </section>
      </div>
    </div>
  );
}

function App() {
  const saved = localStorage.getItem('fluxo-route') || 'dashboard';
  const [route, setRoute] = useState(saved);
  const [empresa, setEmpresa] = useState(null);
  const [cmdk, setCmdk] = useState(false);
  const [cfg, setCfg] = useState(TWEAK_DEFAULTS);
  const [theme, setTheme] = useState(() => localStorage.getItem('fluxo-theme') || 'light');

  useEffect(() => { applyAccent(cfg.accent); applyFont(cfg.font); }, [cfg]);
  useEffect(() => { localStorage.setItem('fluxo-route', route); }, [route]);
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem('fluxo-theme', theme);
  }, [theme]);
  const toggleTheme = () => setTheme(t => t==='dark' ? 'light' : 'dark');

  useEffect(() => {
    const h = e => { e.preventDefault(); e.stopPropagation(); };
    const k = e => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); setCmdk(true); }
    };
    window.addEventListener('keydown', k);
    return () => window.removeEventListener('keydown', k);
  }, []);



  const renderRoute = () => {
    switch(route) {
      case 'dashboard': return <Dashboard setRoute={setRoute} openEmpresa={setEmpresa}/>;
      case 'empresas': return <Empresas openEmpresa={setEmpresa}/>;
      case 'tarefas': return <Tarefas/>;
      case 'checklists': return <Checklists/>;
      case 'comunicacoes': return <Comunicacoes/>;
      case 'relatorios': return <Placeholder title="Relatórios" sub="DRE, razão e apurações" icon="chart"/>;
      case 'integracoes': return <Placeholder title="Integrações" sub="Bancos, ERPs e contadores" icon="link"/>;
      case 'financeiro': return <Placeholder title="Financeiro" sub="Contas a pagar e a receber" icon="trending"/>;
      case 'config': return <Ajustes cfg={cfg} setCfg={setCfg} theme={theme} toggleTheme={toggleTheme}/>;
      default: return null;
    }
  };

  return (
    <div className="fx-app" data-screen-label={route}>
      <Sidebar route={route} setRoute={setRoute}/>
      <main className="fx-main">
        <Topbar route={route} setRoute={setRoute} onCmdK={()=>setCmdk(true)} theme={theme} toggleTheme={toggleTheme}/>
        <div className="fx-content">{renderRoute()}</div>
      </main>
      <EmpresaModal empresa={empresa} onClose={()=>setEmpresa(null)}/>
      <CmdK open={cmdk} onClose={()=>setCmdk(false)} onOpen={setEmpresa}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
